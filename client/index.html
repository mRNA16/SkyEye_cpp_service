<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyEye | 智控动作检测核心</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-base: #060913;
            --panel-bg: rgba(16, 22, 42, 0.6);
            --accent-blue: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --danger-red: #ff3366;
            --text-main: #f0f4fc;
            --text-dim: #8b9bb4;
            --border-subtle: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 0%, #111a3a 0%, var(--bg-base) 60%);
        }

        /* 顶部导航标题 */
        header {
            padding: 24px 40px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(6, 9, 19, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-dim);
            box-shadow: 0 0 0 rgba(0, 0, 0, 0);
            transition: all 0.3s;
        }

        .status-dot.active {
            background: var(--accent-blue);
            box-shadow: 0 0 12px var(--accent-blue);
        }

        /* 核心布局 */
        main {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
            padding: 32px 40px;
            flex: 1;
        }

        /* 玻璃态面板共同类 */
        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-panel h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
            font-weight: 600;
        }

        /* 操控台表单 */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 600;
        }

        .form-group input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        /* 按钮组 */
        .btn {
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-launch {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-launch:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.6);
        }

        .btn-offline {
            background: transparent;
            color: var(--danger-red);
            border: 1px solid var(--danger-red);
        }

        .btn-offline:hover {
            background: rgba(255, 51, 102, 0.1);
        }

        .btn-report {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border-subtle);
            margin-top: auto;
        }

        .btn-report:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* 报告区域 */
        .report-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 150px);
            padding-right: 10px;
        }

        .report-section::-webkit-scrollbar {
            width: 6px;
        }

        .report-section::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 15px;
            text-align: center;
            gap: 16px;
        }

        .empty-state svg {
            opacity: 0.2;
            width: 64px;
            height: 64px;
        }

        /* 动作卡片瀑布流 */
        .action-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-left: 4px solid var(--accent-blue);
            border-radius: 8px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .action-card:hover {
            background: rgba(0, 229, 255, 0.05);
            border-color: var(--accent-blue);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .action-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .action-name {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .action-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent-blue);
            background: rgba(0, 229, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            width: fit-content;
        }

        .action-score {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .score-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 300;
            color: white;
        }

        .score-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* Loading 效果 */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .btn.loading .spinner {
            display: block;
        }

        .btn.loading span {
            display: none;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* 系统消息日志 */
        .log-box {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-dim);
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 6px;
            min-height: 80px;
            max-height: 180px;
            overflow-y: auto;
            word-wrap: break-word;
        }

        .log-box::-webkit-scrollbar {
            width: 4px;
        }

        .log-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        /* 报告栏标题行（标题 + 关闭按钮） */
        .report-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 4px;
        }

        .report-header-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn-close-report {
            background: transparent;
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
            padding: 4px 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-close-report:hover {
            border-color: var(--danger-red);
            color: var(--danger-red);
            background: rgba(255, 51, 102, 0.08);
        }

        /* ── Tab Bar ── */
        .tab-bar {
            display: flex;
            gap: 0;
            padding: 0 40px;
            background: rgba(6, 9, 19, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 73px;
            z-index: 99;
        }

        .tab-btn {
            position: relative;
            padding: 14px 28px;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn--active {
            color: var(--accent-blue);
        }

        .tab-indicator {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent-blue);
            box-shadow: 0 0 8px var(--accent-blue);
            transform: scaleX(0);
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tab-btn--active .tab-indicator {
            transform: scaleX(1);
        }

        .tab-section {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
            padding: 32px 40px;
            flex: 1;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 46px;
        }

        .file-input-label:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px var(--accent-glow);
            color: var(--text-main);
        }

        .file-input-label.has-file {
            border-color: rgba(0, 229, 255, 0.4);
            color: var(--text-main);
        }

        .file-input-icon {
            flex-shrink: 0;
            font-size: 16px;
        }

        main {
            display: block;
            padding: 0;
            flex: 1;
        }
    </style>
</head>

<body>

    <header>
        <h1>SKYEYE<span style="font-weight: 300; opacity: 0.5;"> // TRIDET DEPLOYMENT</span></h1>
        <div class="server-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Awaiting Signal</span>
        </div>
    </header>

    <nav class="tab-bar" id="tabBar">
        <button class="tab-btn tab-btn--active" id="tabLive" onclick="switchTab('live')">
            <span class="tab-indicator"></span>
            LIVE STREAM
        </button>
        <button class="tab-btn" id="tabLocal" onclick="switchTab('local')">
            <span class="tab-indicator"></span>
            LOCAL VIDEO
        </button>
    </nav>

    <main id="appMain">
        <section id="sectionLive" class="tab-section">
            <!-- 左侧操作台 -->
            <div class="glass-panel">
                <h2>Command Console</h2>

                <div class="form-group">
                    <label>CAMERA ID / 流追踪编号</label>
                    <input type="text" id="cameraId" value="CAM_TEST_001" placeholder="Enter Camera ID">
                </div>

                <div class="form-group">
                    <label>RTSP / VIDEO URL</label>
                    <input type="text" id="videoUrl" value="rtsp://localhost:8554/live" placeholder="rtsp://...">
                </div>

                <div style="display: flex; gap: 12px; margin-top: 10px;">
                    <button class="btn btn-launch" id="btnLaunch" style="flex: 2;" onclick="handleLaunch()">
                        <div class="spinner"></div>
                        <span>启 动 直 播 (Launch)</span>
                    </button>
                    <button class="btn btn-offline" id="btnOffline" style="flex: 1;" onclick="handleOffline()" disabled>
                        <div class="spinner"></div>
                        <span>退 出 (Stop)</span>
                    </button>
                </div>

                <div class="log-box" id="sysLog">
                    > System initialized. Ready to connect C++ Tridet Backend.
                </div>

                <button class="btn btn-report" id="btnReport" onclick="fetchLiveReport()">
                    <div class="spinner"></div>
                    <span>获取最新动作检测结案报告</span>
                </button>
            </div>

            <!-- 右侧大屏可视化 -->
            <div class="report-section" id="liveReportSection">
                <!-- 实时视频监控区 -->
                <div id="videoContainer"
                    style="width:100%; aspect-ratio: 16/9; background:#000; border-radius:12px; overflow:hidden; border:1px solid var(--border-subtle); margin-bottom:20px; position:relative; display:none;">
                    <video id="liveVideo" autoplay playsinline muted
                        style="width:100%; height:100%; object-fit: contain;"></video>
                    <div
                        style="position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:4px; font-size:12px; color:var(--accent-blue); backdrop-filter:blur(4px); display:flex; align-items:center; gap:6px;">
                        <span
                            style="width:8px; height:8px; background:var(--accent-blue); border-radius:50%; box-shadow:0 0 6px var(--accent-blue);"></span>
                        LIVE WEBRTC
                    </div>
                </div>

                <div class="empty-state" id="emptyState">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
                    </svg>
                    <div>尚未拉取报告<br><span style="font-size: 13px; opacity: 0.6; font-weight: 400;">请在截断直播并执行完 1D-NMS
                            提纯后台指令后，点击获取报告</span></div>
                </div>

                <div id="liveCardsContainer"></div>
            </div>
        </section>

        <!-- ═══════════════ LOCAL VIDEO TAB ═══════════════ -->
        <section id="sectionLocal" class="tab-section" style="display:none;">
            <!-- Left: Local Video Control Panel -->
            <div class="glass-panel" id="localControlPanel">
                <h2>Local Video Console</h2>

                <!-- File picker -->
                <div class="form-group">
                    <label>VIDEO FILE / 本地视频文件</label>
                    <label class="file-input-label" id="fileInputLabel">
                        <input type="file" id="localFileInput" accept="video/mp4,video/webm,video/*"
                            onchange="handleLocalFileSelect(event)" style="display:none;">
                        <span id="fileInputText">选择视频文件...</span>
                        <span class="file-input-icon">&#128193;</span>
                    </label>
                </div>

                <!-- Playback controls -->
                <div style="display: flex; gap: 12px; margin-top: 4px;">
                    <button class="btn btn-launch" id="btnLocalPlay" style="flex:1;" onclick="handleLocalPlayPause()"
                        disabled>
                        <div class="spinner"></div>
                        <span id="localPlayLabel">▶ PLAY</span>
                    </button>
                </div>

                <!-- Path input for server-side analysis -->
                <div class="form-group">
                    <label>SERVER PATH / 服务端文件路径 (FFmpeg)</label>
                    <input type="text" id="localServerPath" placeholder="e.g. C:\videos\flight.mp4">
                </div>

                <!-- Camera ID for local analysis session -->
                <div class="form-group">
                    <label>ANALYSIS SESSION ID</label>
                    <input type="text" id="localCameraId" value="LOCAL_ANALYSIS_001" placeholder="Session identifier">
                </div>

                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-launch" id="btnSendToBackend" style="flex:2;" onclick="handleSendToBackend()">
                        <div class="spinner"></div>
                        <span>开 始 分 析 (Analyze)</span>
                    </button>
                    <button class="btn btn-offline" id="btnLocalOffline" style="flex:1;" onclick="handleLocalOffline()"
                        disabled>
                        <div class="spinner"></div>
                        <span>停 止</span>
                    </button>
                </div>

                <div class="log-box" id="localLog">
                    > Local video module ready.
                </div>

                <button class="btn btn-report" id="btnLocalReport" onclick="fetchLocalReport()">
                    <div class="spinner"></div>
                    <span>获取本地视频检测报告</span>
                </button>
            </div>

            <!-- Right: Local Video Player + Report -->
            <div class="report-section" id="localReportSection">
                <!-- Native browser video player -->
                <div id="localVideoContainer"
                    style="width:100%; aspect-ratio:16/9; background:#000; border-radius:12px; overflow:hidden; border:1px solid var(--border-subtle); margin-bottom:20px; position:relative; display:none;">
                    <video id="localVideo" controls style="width:100%; height:100%; object-fit:contain;">
                    </video>
                    <div
                        style="position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:4px; font-size:12px; color:var(--text-dim); backdrop-filter:blur(4px); display:flex; align-items:center; gap:6px;">
                        <span style="width:8px; height:8px; background:var(--text-dim); border-radius:50%;"></span>
                        LOCAL FILE
                    </div>
                </div>

                <!-- Empty state for local tab -->
                <div class="empty-state" id="localEmptyState">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path
                            d="M15 10l4.553-2.069A1 1 0 0 1 21 8.82v6.36a1 1 0 0 1-1.447.89L15 14M3 8a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8z" />
                    </svg>
                    <div>选择本地视频文件以开始播放<br><span style="font-size: 13px; opacity: 0.6; font-weight: 400;">支持 MP4 / WebM /
                            其他浏览器原生支持的格式</span></div>
                </div>

                <!-- Local analysis report cards appended here -->
                <div id="localCardsContainer"></div>
            </div>
        </section>
    </main>

    <script>
        // 自动适配服务端地址（解决跨域限制）
        const API_BASE = window.location.origin;

        const logBox = document.getElementById('sysLog');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const liveVideo = document.getElementById('liveVideo');
        const videoContainer = document.getElementById('videoContainer');
        const emptyState = document.getElementById('emptyState');

        // ── New refs for Live tab ──
        const liveReportSection = document.getElementById('liveReportSection');
        const liveCardsContainer = document.getElementById('liveCardsContainer');

        // ── New refs for Local tab ──
        const localLog = document.getElementById('localLog');
        const localReportSection = document.getElementById('localReportSection');
        const localCardsContainer = document.getElementById('localCardsContainer');
        const localVideoEl = document.getElementById('localVideo');
        const localVideoContainer = document.getElementById('localVideoContainer');
        const localEmptyState = document.getElementById('localEmptyState');

        // ── New State ──
        let currentTab = 'live';
        let localVideoObjectURL = null;
        let localFileSelected = false;
        let localIsPlaying = false;
        let pc = null; // WebRTC PeerConnection

        const LOG_MAX_LINES = 60;

        function appendLog(msg) {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.style.marginBottom = '4px';
            entry.innerHTML = `[${time}] ${msg}`;
            logBox.insertBefore(entry, logBox.firstChild);
            // 超出上限时移除最旧的条目
            while (logBox.childElementCount > LOG_MAX_LINES) {
                logBox.removeChild(logBox.lastChild);
            }
        }

        function appendLocalLog(msg) {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.style.marginBottom = '4px';
            entry.innerHTML = `[${time}] ${msg}`;
            localLog.insertBefore(entry, localLog.firstChild);
            while (localLog.childElementCount > LOG_MAX_LINES) {
                localLog.removeChild(localLog.lastChild);
            }
        }

        function setStatus(isActive, text) {
            statusText.innerText = text;
            if (isActive) {
                statusDot.classList.add('active');
            } else {
                statusDot.classList.remove('active');
            }
        }

        function switchTab(tabName) {
            if (tabName === currentTab) return;
            currentTab = tabName;

            const sectionLive = document.getElementById('sectionLive');
            const sectionLocal = document.getElementById('sectionLocal');
            const tabLiveBtn = document.getElementById('tabLive');
            const tabLocalBtn = document.getElementById('tabLocal');

            if (tabName === 'live') {
                sectionLive.style.display = 'grid';
                sectionLocal.style.display = 'none';
                tabLiveBtn.classList.add('tab-btn--active');
                tabLocalBtn.classList.remove('tab-btn--active');
            } else {
                sectionLive.style.display = 'none';
                sectionLocal.style.display = 'grid';
                tabLiveBtn.classList.remove('tab-btn--active');
                tabLocalBtn.classList.add('tab-btn--active');
            }
        }

        function handleLocalFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (localVideoObjectURL) {
                URL.revokeObjectURL(localVideoObjectURL);
            }

            localVideoObjectURL = URL.createObjectURL(file);
            localVideoEl.src = localVideoObjectURL;
            localVideoEl.load();

            document.getElementById('fileInputText').textContent = file.name;
            document.getElementById('fileInputLabel').classList.add('has-file');
            document.getElementById('btnLocalPlay').disabled = false;
            localFileSelected = true;
            localIsPlaying = false;
            document.getElementById('localPlayLabel').textContent = '▶ PLAY';

            localVideoContainer.style.display = 'block';
            localEmptyState.style.display = 'none';

            appendLocalLog(`File loaded: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`);
            document.getElementById('localServerPath').placeholder = `e.g. C:\\videos\\${file.name}`;
        }

        function handleLocalPlayPause() {
            if (!localFileSelected) return;

            if (localIsPlaying) {
                localVideoEl.pause();
                localIsPlaying = false;
                document.getElementById('localPlayLabel').textContent = '▶ PLAY';
            } else {
                localVideoEl.play().catch(e => appendLocalLog(`Play error: ${e.message}`));
                localIsPlaying = true;
                document.getElementById('localPlayLabel').textContent = '⏸ PAUSE';
            }
        }

        async function handleSendToBackend() {
            const serverPath = document.getElementById('localServerPath').value.trim();
            const sessionId = document.getElementById('localCameraId').value.trim();
            const btn = document.getElementById('btnSendToBackend');

            if (!serverPath || !sessionId) return alert("Please specify Server Path and Session ID!");

            // 取消上一次遗留的轮询
            cancelPolling(localReportPollTimer);
            cancelPolling(localPredPollTimer);

            btn.classList.add('loading');
            try {
                const res = await fetch(`${API_BASE}/launch_local_video`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ session_id: sessionId, file_path: serverPath })
                });
                const data = await res.json();
                appendLocalLog(`Backend Launch: ${data.msg || (data.code === 200 ? 'Success' : 'Failed')}`);
                if (data.code === 200) {
                    btn.disabled = true;
                    document.getElementById('btnLocalOffline').disabled = false;
                    appendLocalLog('>>> 后台分析中，完成后将自动通知...');
                    // 启动伪在线预测轮询
                    startLivePredPolling(sessionId, appendLocalLog, localPredPollTimer);
                    startReportPolling(sessionId, appendLocalLog, localReportPollTimer, () => {
                        // 分析完成后自动重置按钮状态
                        document.getElementById('btnSendToBackend').disabled = false;
                        document.getElementById('btnLocalOffline').disabled = true;
                    });
                }
            } catch (e) {
                appendLocalLog(`<span style="color:var(--danger-red)">API Error: ${e.message}</span>`);
            }
            btn.classList.remove('loading');
        }

        async function handleLocalOffline() {
            const sessionId = document.getElementById('localCameraId').value.trim();
            const btn = document.getElementById('btnLocalOffline');

            btn.classList.add('loading');
            try {
                const res = await fetch(`${API_BASE}/offline_camera`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ camera_id: sessionId })
                });
                const data = await res.json();
                appendLocalLog(`Offline Request: ${data.msg}`);
                if (data.code === 200) {
                    document.getElementById('btnSendToBackend').disabled = false;
                    btn.disabled = true;
                    appendLocalLog('>>> 后台处理中，分析完成后将自动通知...');
                    // 停止伪在线轮询，启动报告就绪轮询
                    cancelPolling(localPredPollTimer);
                    startReportPolling(sessionId, appendLocalLog, localReportPollTimer);
                }
            } catch (e) {
                appendLocalLog(`<span style="color:var(--danger-red)">API Error: ${e.message}</span>`);
            }
            btn.classList.remove('loading');
        }

        // ── 轮询报告就绪 ──────────────────────────────────────────────────────────
        let liveReportPollTimer = { id: null };
        let localReportPollTimer = { id: null };

        // ── 伪在线预测轮询 ────────────────────────────────────────────────────────
        let livePredPollTimer  = { id: null };
        let localPredPollTimer = { id: null };

        // 类别标签映射（与 C++ 端 ACTION_CLASSES 顺序一致）
        const ACTION_LABELS = [
            '背景', '驾驶杆', '油门杆', '起落架', '减速板', '襟翼',
            '计算机', '配平轮', '发动机开关', '发动机模式选择', '方向舵配平',
            'EFIS控制', '速度选择', '航向选择', '高度选择', '垂直速度选择', '自动驾驶'
        ];

        function startLivePredPolling(cameraId, logFn, timerRef) {
            cancelPolling(timerRef);
            const INTERVAL = 10000; // 10 秒轮询一次，低频
            let lastKey = '';

            function tick() {
                fetch(`${API_BASE}/get_live_prediction`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ camera_id: cameraId })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.code === 200 && data.predictions && data.predictions.length) {
                        const key = JSON.stringify(data.predictions);
                        if (key !== lastKey) {
                            lastKey = key;
                            // 过滤背景（label=0）并按分数降序取 top-3
                            const top = data.predictions
                                .filter(p => p.label !== 0 && p.score >= 0.05)
                                .sort((a, b) => b.score - a.score)
                                .slice(0, 3);
                            if (top.length) {
                                const txt = top.map(p => {
                                    const name = ACTION_LABELS[p.label] || `动作#${p.label}`;
                                    return `${name} ${p.start.toFixed(1)}s-${p.end.toFixed(1)}s (${(p.score * 100).toFixed(0)}%)`;
                                }).join(' | ');
                                logFn(`<span style="color:var(--accent-cyan);opacity:0.85;">[预测] ${txt}</span>`);
                            }
                        }
                    }
                    timerRef.id = setTimeout(tick, INTERVAL);
                })
                .catch(() => { timerRef.id = setTimeout(tick, INTERVAL); });
            }

            timerRef.id = setTimeout(tick, INTERVAL);
        }

        function startReportPolling(cameraId, logFn, timerRef, onReady) {
            const INTERVAL = 4000;

            function tick() {
                fetch(`${API_BASE}/get_report`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ camera_id: cameraId })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.code === 200 && data.data && data.data.actions) {
                        const count = data.data.actions.length;
                        logFn(`<span style="color:var(--accent-blue);font-weight:600;">` +
                              `✔ 分析完成！检测到 ${count} 条动作事件，请点击获取报告查看。` +
                              `</span>`);
                        timerRef.id = null;
                        if (onReady) onReady();
                    } else {
                        timerRef.id = setTimeout(tick, INTERVAL);
                    }
                })
                .catch(() => {
                    timerRef.id = setTimeout(tick, INTERVAL);
                });
            }

            timerRef.id = setTimeout(tick, INTERVAL);
        }

        function cancelPolling(timerRef) {
            if (timerRef.id) {
                clearTimeout(timerRef.id);
                timerRef.id = null;
            }
        }

        // 发起相机提取流请求
        async function handleLaunch() {
            const camId = document.getElementById('cameraId').value;
            const url = document.getElementById('videoUrl').value;
            const btn = document.getElementById('btnLaunch');

            if (!camId || !url) return alert("Please specify Camera ID and URL!");

            // 取消上一次遗留的轮询
            cancelPolling(liveReportPollTimer);
            cancelPolling(livePredPollTimer);

            btn.classList.add('loading');
            try {
                const res = await fetch(`${API_BASE}/launch_camera`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ camera_id: camId, video_url: url })
                });
                const data = await res.json();
                appendLog(`Launch Request: ${data.msg || (data.code === 200 ? 'Success' : 'Failed')}`);
                if (data.code === 200) {
                    setStatus(true, "STREAMING & EXTRACTING...");
                    btn.disabled = true;
                    document.getElementById('btnOffline').disabled = false;

                    // 启动伪在线预测轮询
                    startLivePredPolling(camId, appendLog, livePredPollTimer);

                    // 启动 WebRTC
                    startWebRTC(camId);
                }
            } catch (e) {
                appendLog(`<span style="color:var(--danger-red)">API Error: C++ 服务未响应 (${e.message})</span>`);
            }
            btn.classList.remove('loading');
        }

        // 停止相机并下线触发 NMS 一把梭报告
        async function handleOffline() {
            const camId = document.getElementById('cameraId').value;
            const btn = document.getElementById('btnOffline');

            btn.classList.add('loading');
            try {
                const res = await fetch(`${API_BASE}/offline_camera`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ camera_id: camId })
                });
                const data = await res.json();
                appendLog(`Offline Request: ${data.msg}`);
                if (data.code === 200) {
                    setStatus(false, "OFFLINE / PROCESSING NMS");
                    document.getElementById('btnLaunch').disabled = false;
                    btn.disabled = true;
                    stopWebRTC();
                    // 停止伪在线预测轮询，启动报告就绪轮询
                    cancelPolling(livePredPollTimer);
                    appendLog(">>> 后台 NMS 推理中，分析完成后将自动通知...");
                    startReportPolling(camId, appendLog, liveReportPollTimer);
                }
            } catch (e) {
                appendLog(`<span style="color:var(--danger-red)">API Error (${e.message})</span>`);
            }
            btn.classList.remove('loading');
        }

        async function fetchLiveReport() {
            const camId = document.getElementById('cameraId').value;
            const btn = document.getElementById('btnReport');

            btn.classList.add('loading');
            liveCardsContainer.innerHTML = `<div class="empty-state"><div class="spinner" style="display:block;"></div><div>拉取解码报告中...</div></div>`;

            try {
                const res = await fetch(`${API_BASE}/get_report`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ camera_id: camId })
                });
                const data = await res.json();

                if (data.code === 200 && data.data && data.data.actions) {
                    appendLog(`<span style="color:var(--accent-blue)">>>> JSON 捕获！共解析到 ${data.data.actions.length} 条过滤后航空动作！</span>`);
                    setStatus(false, "REPORT GENERATED");
                    renderLiveCards(data.data.actions);
                } else {
                    appendLog(`<span style="color:var(--danger-red)">Result: ${data.msg || '暂无报告生成'}</span>`);
                    liveCardsContainer.innerHTML = `<div class="empty-state">尚未出结果或报告未生成</div>`;
                }
            } catch (e) {
                appendLog(`<span style="color:var(--danger-red)">Fetch Error: ${e.message}</span>`);
                liveCardsContainer.innerHTML = `<div class="empty-state" style="color: var(--danger-red)">API连接失败，请确认 C++ 后端在线。</div>`;
            }
            btn.classList.remove('loading');
        }

        async function fetchLocalReport() {
            const sessionId = document.getElementById('localCameraId').value.trim();
            const btn = document.getElementById('btnLocalReport');

            btn.classList.add('loading');
            localCardsContainer.innerHTML = `<div class="empty-state"><div class="spinner" style="display:block;"></div><div>拉取本地视频检测报告...</div></div>`;

            try {
                const res = await fetch(`${API_BASE}/get_report`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ camera_id: sessionId })
                });
                const data = await res.json();

                if (data.code === 200 && data.data && data.data.actions) {
                    appendLocalLog(`>>> 报告捕获！${data.data.actions.length} 条动作事件`);
                    renderLocalCards(data.data.actions);
                } else {
                    appendLocalLog(`<span style="color:var(--danger-red)">Result: ${data.msg || '暂无报告'}</span>`);
                    localCardsContainer.innerHTML = `<div class="empty-state">尚未出结果或报告未生成</div>`;
                }
            } catch (e) {
                appendLocalLog(`<span style="color:var(--danger-red)">Fetch Error: ${e.message}</span>`);
                localCardsContainer.innerHTML = `<div class="empty-state" style="color: var(--danger-red)">API连接失败，请确认 C++ 后端在线。</div>`;
            }
            btn.classList.remove('loading');
        }

        // WebRTC 核心逻辑
        async function startWebRTC(camera_id) {
            appendLog("Initializing WebRTC Handshake...");

            pc = new RTCPeerConnection({
                iceServers: [] // 本地调试优先禁用外部 STUN
            });

            pc.ontrack = (event) => {
                appendLog("WebRTC Stream Received! Attaching to player...");
                if (event.streams && event.streams[0]) {
                    liveVideo.srcObject = event.streams[0];
                } else {
                    let inboundStream = new MediaStream();
                    inboundStream.addTrack(event.track);
                    liveVideo.srcObject = inboundStream;
                }
                videoContainer.style.display = 'block';
                emptyState.style.display = 'none';
                liveVideo.play().catch((e) => { appendLog(`video.play() rejected: ${e.message}`); });
            };

            pc.onconnectionstatechange = () => {
                appendLog(`PeerConnection State: <b>${pc.connectionState}</b>`);
            };

            let sdpSent = false;
            const sendOffer = async () => {
                if (sdpSent) return;
                sdpSent = true;
                const offer = pc.localDescription;

                try {
                    const res = await fetch(`${API_BASE}/webrtc/offer`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({
                            camera_id: camera_id,
                            sdp: offer.sdp
                        })
                    });
                    const data = await res.json();
                    if (data.sdp) {
                        await pc.setRemoteDescription(new RTCSessionDescription({
                            type: 'answer',
                            sdp: data.sdp
                        }));
                    }
                } catch (err) {
                    appendLog(`<span style="color:var(--danger-red)">WebRTC Fetch Error: ${err.message}</span>`);
                }
            };

            pc.onicegatheringstatechange = () => {
                if (pc.iceGatheringState === 'complete') {
                    sendOffer();
                }
            };

            pc.addTransceiver('video', { direction: 'recvonly' });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            setTimeout(() => {
                if (!sdpSent) sendOffer();
            }, 15000);
        }

        function stopWebRTC() {
            if (pc) {
                pc.close();
                pc = null;
            }
            videoContainer.style.display = 'none';
            emptyState.style.display = 'flex';
        }

        function buildActionCard(act, index) {
            const delay = index * 0.08;
            const startStr = Number(act.start).toFixed(2) + "s";
            const endStr = Number(act.end).toFixed(2) + "s";
            const scoreStr = Number(act.score).toFixed(3);
            let isWarning = act.action.includes("SpeedBrakes") || act.action.includes("AlartLight");
            let bderColor = isWarning ? 'var(--danger-red)' : 'var(--accent-blue)';

            const card = document.createElement('div');
            card.className = 'action-card';
            card.style.animationDelay = `${delay}s`;
            card.style.borderLeftColor = bderColor;

            card.innerHTML = `
                <div class="action-info">
                    <div class="action-name">${act.action}</div>
                    <div class="action-time">Timeline: [ ${startStr} — ${endStr} ]</div>
                </div>
                <div class="action-score">
                    <div class="score-val">${scoreStr}</div>
                    <div class="score-label">Confidence</div>
                </div>
            `;
            return card;
        }

        function renderLiveCards(actions) {
            liveCardsContainer.innerHTML = '';
            if (actions.length === 0) {
                liveCardsContainer.innerHTML = `<div class="empty-state">本时段未检测到任何显式过阈值的控制室操作。</div>`;
                return;
            }
            // 报告标题行 + 关闭按钮
            const header = document.createElement('div');
            header.className = 'report-header';
            header.innerHTML = `
                <span class="report-header-title">Detection Report · ${actions.length} events</span>
                <button class="btn-close-report" onclick="clearLiveReport()">✕ 关闭报告</button>
            `;
            liveCardsContainer.appendChild(header);
            actions.forEach((act, i) => liveCardsContainer.appendChild(buildActionCard(act, i)));
        }

        function clearLiveReport() {
            liveCardsContainer.innerHTML = '';
            // 若直播已停止（videoContainer 隐藏），则恢复空状态提示
            if (videoContainer.style.display === 'none') {
                emptyState.style.display = 'flex';
            }
        }

        function renderLocalCards(actions) {
            localCardsContainer.innerHTML = '';
            if (actions.length === 0) {
                localCardsContainer.innerHTML = `<div class="empty-state">本时段未检测到任何显式过阈值的控制室操作。</div>`;
                return;
            }
            const header = document.createElement('div');
            header.className = 'report-header';
            header.innerHTML = `
                <span class="report-header-title">Detection Report · ${actions.length} events</span>
                <button class="btn-close-report" onclick="clearLocalReport()">✕ 关闭报告</button>
            `;
            localCardsContainer.appendChild(header);
            actions.forEach((act, i) => localCardsContainer.appendChild(buildActionCard(act, i)));
        }

        function clearLocalReport() {
            localCardsContainer.innerHTML = '';
            // 若没有选择文件（视频容器隐藏），则恢复空状态提示
            if (localVideoContainer.style.display === 'none') {
                localEmptyState.style.display = 'flex';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            localVideoEl.addEventListener('ended', () => {
                localIsPlaying = false;
                document.getElementById('localPlayLabel').textContent = '▶ PLAY';
                appendLocalLog('Playback finished.');
            });
            localVideoEl.addEventListener('play', () => {
                localIsPlaying = true;
                document.getElementById('localPlayLabel').textContent = '⏸ PAUSE';
            });
            localVideoEl.addEventListener('pause', () => {
                localIsPlaying = false;
                document.getElementById('localPlayLabel').textContent = '▶ PLAY';
            });
        });
    </script>
</body>
